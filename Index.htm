<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Calculator</title>
  <style>
    body {
      background: #f6f6f6;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }
    .calculator {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      width: 290px;
    }
    .display {
      width: 100%;
      height: 48px;
      background: #f1f1f1;
      border-radius: 8px;
      text-align: right;
      font-size: 2em;
      padding: 8px 12px;
      margin-bottom: 12px;
      color: #222;
      box-sizing: border-box;
      border: none;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    button {
      font-size: 1.2em;
      padding: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #eaecf0;
      color: #333;
      transition: background 0.2s;
    }
    button.operator {
      background: #ffd966;
      color: #222;
    }
    button.equal {
      background: #8fd694;
      color: #fff;
      grid-column: span 2;
    }
    button.clear {
      background: #ff7373;
      color: #fff;
    }
    button:hover {
      background: #bec6cf;
    }
    button.operator:hover {
      background: #ffe599;
    }
    button.equal:hover {
      background: #6abe7a;
    }
    button.clear:hover {
      background: #ff5151;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" class="display" id="display" disabled />
    <div class="buttons">
      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('*')">&times;</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
