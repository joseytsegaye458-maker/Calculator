<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong Game</title>
  <style>
    body {
      background: #222;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    h1 {
      font-family: monospace;
      margin-bottom: 12px;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      border: 2px solid #aaa;
      background: #222;
      display: block;
      margin-bottom: 10px;
    }
    #scoreboard {
      font-family: monospace;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <h1>Pong Game</h1>
  <div id="game-container">
    <canvas id="pong" width="700" height="400"></canvas>
    <div id="scoreboard">Player: 0 &nbsp;&nbsp;&nbsp; Computer: 0</div>
  </div>
  <script>
    const canvas = document.getElementById('pong');
    const ctx = canvas.getContext('2d');
    const scoreboard = document.getElementById('scoreboard');

    // Paddle settings
    const PADDLE_WIDTH = 10, PADDLE_HEIGHT = 80;
    let leftPaddleY = (canvas.height - PADDLE_HEIGHT) / 2;
    let rightPaddleY = (canvas.height - PADDLE_HEIGHT) / 2;
    const PADDLE_SPEED = 6, AI_SPEED = 3.2;

    // Ball settings
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballRadius = 8;
    let ballSpeedX = 5, ballSpeedY = 3;  // Initial speed

    let leftScore = 0, rightScore = 0;

    // Keyboard control
    let upPressed = false, downPressed = false;

    // Mouse control
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      let mouseY = e.clientY - rect.top;
      leftPaddleY = mouseY - PADDLE_HEIGHT / 2;
      limitPaddle();
    });

    function limitPaddle() {
      // Restrict paddles to within the canvas
      leftPaddleY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, leftPaddleY));
      rightPaddleY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, rightPaddleY));
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowUp") upPressed = true;
      else if (e.key === "ArrowDown") downPressed = true;
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === "ArrowUp") upPressed = false;
      else if (e.key === "ArrowDown") downPressed = false;
    });

    function drawRect(x, y, w, h, color = "#fff") {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawBall(x, y, r, color = "#fff") {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.closePath();
    }

    function drawNet() {
      ctx.strokeStyle = "#888";
      ctx.beginPath();
      let x = canvas.width / 2, step = 20;
      for (let y = 0; y < canvas.height; y += step * 2) {
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + step);
      }
      ctx.stroke();
    }

    function resetBall(scoredLeft) {
      ballX = canvas.width / 2;
      ballY = canvas.height / 2;
      let dir = scoredLeft ? 1 : -1; // who gets the ball
      ballSpeedX = dir * (4 + Math.random() * 2);
      ballSpeedY = (Math.random() * 4 - 2);
    }

    function update() {
      // Move left paddle with keys as well
      if (upPressed) {
        leftPaddleY -= PADDLE_SPEED;
        limitPaddle();
      }
      if (downPressed) {
        leftPaddleY += PADDLE_SPEED;
        limitPaddle();
      }

      // Computer (right paddle) follows the ball smoothly
      let target = ballY - PADDLE_HEIGHT / 2;
      if (rightPaddleY < target) rightPaddleY += Math.min(AI_SPEED, target - rightPaddleY);
      else if (rightPaddleY > target) rightPaddleY -= Math.min(AI_SPEED, rightPaddleY - target);
      limitPaddle();

      // Move ball
      ballX += ballSpeedX;
      ballY += ballSpeedY;

      // Collide with top/bottom
      if (ballY - ballRadius < 0) {
        ballY = ballRadius;
        ballSpeedY *= -1;
      } else if (ballY + ballRadius > canvas.height) {
        ballY = canvas.height - ballRadius;
        ballSpeedY *= -1;
      }

      // Left paddle collision
      if (ballX - ballRadius < PADDLE_WIDTH &&
          ballY > leftPaddleY &&
          ballY < leftPaddleY + PADDLE_HEIGHT) {
        ballX = PADDLE_WIDTH + ballRadius;
        ballSpeedX *= -1.06;
        // Add spin
        let swing = ((ballY - (leftPaddleY + PADDLE_HEIGHT/2)) / (PADDLE_HEIGHT/2));
        ballSpeedY += swing * 2;
      }

      // Right paddle collision (computer)
      if (ballX + ballRadius > canvas.width - PADDLE_WIDTH &&
          ballY > rightPaddleY &&
          ballY < rightPaddleY + PADDLE_HEIGHT) {
        ballX = canvas.width - PADDLE_WIDTH - ballRadius;
        ballSpeedX *= -1.06;
        let swing = ((ballY - (rightPaddleY + PADDLE_HEIGHT/2)) / (PADDLE_HEIGHT/2));
        ballSpeedY += swing * 2;
      }

      // Score
      if (ballX < 0) {
        rightScore++;
        updateScore();
        resetBall(true);
      } else if (ballX > canvas.width) {
        leftScore++;
        updateScore();
        resetBall(false);
      }
    }

    function updateScore() {
      scoreboard.innerHTML =
        `Player: ${leftScore} &nbsp;&nbsp;&nbsp; Computer: ${rightScore}`;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawNet();
      // Paddles
      drawRect(0, leftPaddleY, PADDLE_WIDTH, PADDLE_HEIGHT, "#0ff");
      drawRect(canvas.width - PADDLE_WIDTH, rightPaddleY, PADDLE_WIDTH, PADDLE_HEIGHT, "#f33");
      // Ball
      drawBall(ballX, ballY, ballRadius);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Start
    updateScore();
    resetBall(true);
    gameLoop();
  </script>
</body>
</html>
